<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>대명여고 스마트 급식 알리미</title>

  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <style>
    @import url("https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&display=swap");

    body {
      font-family: "Pretendard", sans-serif;
    }
  </style>
</head>

<body class="min-h-screen bg-slate-100 text-slate-800">
  <main class="mx-auto max-w-md p-5">
    <header class="mb-6 rounded-3xl bg-white p-6 shadow-sm">
      <p class="mb-1 text-sm font-semibold text-blue-600">대명여자고등학교</p>
      <h1 class="text-2xl font-extrabold">스마트 급식 알리미</h1>
      <p class="mt-2 text-sm text-slate-500">
        오늘의 급식 정보를 간편하게 확인하세요.
      </p>
    </header>

    <section class="rounded-3xl bg-white p-6 shadow-sm">
      <div class="mb-5 flex items-center justify-between">
        <div>
          <p class="text-sm text-slate-500">오늘의 급식</p>
          <h2 id="today" class="mt-1 text-lg font-bold"></h2>
        </div>

        <span class="rounded-full bg-blue-100 px-3 py-1 text-sm font-semibold text-blue-700">
          중식
        </span>
      </div>

      <ul class="space-y-3">
        <li class="rounded-2xl bg-slate-50 px-4 py-3">쌀밥</li>
        <li class="rounded-2xl bg-slate-50 px-4 py-3">미역국</li>
        <li class="rounded-2xl bg-slate-50 px-4 py-3">닭갈비</li>
        <li class="rounded-2xl bg-slate-50 px-4 py-3">배추김치</li>
        <li class="rounded-2xl bg-slate-50 px-4 py-3">과일</li>
      </ul>

      <div class="mt-5 rounded-2xl bg-amber-50 p-4">
        <p class="text-sm font-semibold text-amber-800">알레르기 정보</p>
        <p class="mt-1 text-sm text-amber-700">
          식단에 포함된 알레르기 유발 식품을 확인하세요.
        </p>
      </div>
    </section>

    <nav class="mt-6 grid grid-cols-3 gap-3">
      <button class="rounded-2xl bg-blue-600 py-3 font-bold text-white">
        오늘
      </button>

      <button class="rounded-2xl bg-white py-3 font-bold shadow-sm">
        주간 식단
      </button>

      <button class="rounded-2xl bg-white py-3 font-bold shadow-sm">
        설정
      </button>
    </nav>
  </main>

  <script>
    const today = new Date();

    document.getElementById("today").textContent =
      today.toLocaleDateString("ko-KR", {
        month: "long",
        day: "numeric",
        weekday: "long"
      });
  </script>
</body>
</html>
