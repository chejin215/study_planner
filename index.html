    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&display=swap');
        body { 
            font-family: 'Pretendard', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        /* 스무스한 모바일 토글 애니메이션 */
        .bottom-sheet {
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .sheet-hidden {
            transform: translateY(calc(100% - 60px));
        }

        /* 알레르기 위험 메뉴 흔들림(Vibration) 모션 */
        @keyframes subtleShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-2px); }
            75% { transform: translateX(2px); }
        }
        .danger-card-highlight {
            border-color: #fca5a5 !important;
            background-color: #fef2f2 !important;
        }
        .danger-item-highlight {
            background-color: #fee2e2;
            color: #dc2626;
            font-weight: 700;
            animation: subtleShake 0.4s ease-in-out 2;
            border-left: 3px solid #dc2626;
        }
        
        /* 가로 스크롤바 숨기기 (주차 선택 탭용) */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

                        lunch: ["찰보리밥", "쑥갓어묵탕(5.6.9.13)", "숙주목살볶음(5.6.10.13)", "야채비빔만두(5.6.10.13)", "깨순간장조림(5.6.13)", "배추김치(9.13)", "요구르트", "초코숲쿠키(2.6)"],
                        dinner: ["토마토스파게티&미니함박(5.6.10.12.13.15)", "유린기샐러드(5.6.10.13.15)", "수제피클(5.6.13)", "디저트주스"]
                    }
                ],
                "5": [ // 5주차 (6/29 ~ 6/30)
                    {
                        date: "6월 29일 (월)",
                        lunch: ["현미밥", "부대찌개(5.6.10.13.15.16)", "섭산적구이(5.6.10.13.15)", "매콤볼어묵조림(5.6.9.13)", "중화풍가지볶음(5.6.13)", "깍두기(9.13)", "도라에몽암기빵(1.2.6)"],
                        dinner: ["기말시험 준비기간", "지필평가 일정으로 석식 미운영"]
                    },
                    {
                        date: "6월 30일 (화)",
                        lunch: ["찹쌀밥", "시래기국(5.6.13)", "연탄불고기(5.6.10.13)", "메란칠리조림(1.2.5.6.10.13)", "오이고추무침(5.6.13)", "깍두기(9.13)"],
                        dinner: ["지필평가 기간", "기말시험 일정으로 석식 없음 🐻"]
                    }
                ]
            }
        };

        let selectedAllergies = new Set();
        let isSheetOpen = false;
        let currentWeek = 1; // 기본은 1주차

        function init() {
            renderAllergies();
            renderMeals("6", currentWeek);

            // 하단 슬라이드 바 토글 핸들링
            const sheet = document.getElementById('bottomSheet');
            const header = document.getElementById('sheetHeader');
            const toggleText = document.getElementById('toggleText');

            header.addEventListener('click', () => {
                isSheetOpen = !isSheetOpen;
                if (isSheetOpen) {
                    sheet.classList.remove('sheet-hidden');
                    toggleText.innerText = "터치해서 접기";
                } else {
                    sheet.classList.add('sheet-hidden');
                    toggleText.innerText = "터치해서 열기";
                }
            });

            // 알림 시스템 로드
            setupNotificationButton(); 
        }

        // 주차 변경 시 활성화 탭 표시 조절 및 식단 재렌더링
        function changeWeek(weekNum) {
            currentWeek = weekNum;
            document.getElementById('currentWeekTitle').innerText = `${weekNum}주차 급식 안내`;
            
            // 모든 탭 디자인 초기화
            for (let i = 1; i <= 5; i++) {
                const btn = document.getElementById(`tab-w${i}`);
                if (i === weekNum) {
                    btn.className = "flex-shrink-0 px-4 py-1.5 text-xs font-bold rounded-full transition-all bg-blue-600 text-white shadow-sm";
                } else {
                    btn.className = "flex-shrink-0 px-4 py-1.5 text-xs font-bold rounded-full transition-all bg-slate-100 text-slate-500 hover:bg-slate-200";
                }
            }

            renderMeals("6", weekNum);
        }

        // 알레르기 항목 모바일 UI 렌더링
        function renderAllergies() {
            const container = document.getElementById('allergyConfig');
            container.innerHTML = '';

            Object.keys(allergyMap).forEach(num => {
                const label = document.createElement('label');
                label.className = "flex items-center gap-2 p-3 bg-slate-50 border border-slate-100 rounded-xl active:bg-blue-50 transition-all select-none cursor-pointer";
                label.innerHTML = `
                    <input type="checkbox" value="${num}" class="w-4.5 h-4.5 text-blue-600 border-slate-300 rounded-md focus:ring-blue-500">
                    <span class="text-xs font-semibold text-slate-700">${num}. ${allergyMap[num]}</span>
                `;

                label.querySelector('input').addEventListener('change', (e) => {
                    const parsedNum = parseInt(num);
                    if (e.target.checked) {
                        selectedAllergies.add(parsedNum);
                        label.classList.add('bg-blue-50', 'border-blue-200');
                    } else {
                        selectedAllergies.delete(parsedNum);
                        label.classList.remove('bg-blue-50', 'border-blue-200');
                    }
                    document.getElementById('selectedCount').innerText = selectedAllergies.size;
                    renderMeals("6", currentWeek);
                    
                    // 알레르기를 설정할 때마다 주간 급식 내 위험 요소 감지해 실시간 브라우저 푸시 알림 발생
                    checkTodayAllergyAlert(); 
                });

                container.appendChild(label);
            });
        }

        function parseAllergies(menuStr) {
            const match = menuStr.match(/\(([^)]+)\)/);
            if (!match) return [];
            return match[1].split('.').map(num => parseInt(num.trim()));
        }

        // 특정 주차의 6월 식단 렌더링
        function renderMeals(month, week) {
            const container = document.getElementById('mealContainer');
            container.innerHTML = '';

            const list = mealData[month][week] || [];

            list.forEach(day => {
                const card = document.createElement('div');
                card.className = "bg-white border border-slate-200/80 rounded-2xl p-4 shadow-sm transition-all duration-300";

                if (day.isHoliday) {
                    card.className += " border-blue-200 bg-blue-50/20";
                    card.innerHTML = `
                        <div class="font-bold text-sm text-blue-900 border-b border-blue-100 pb-1.5 mb-2">${day.date}</div>
                        <div class="text-center py-8 text-blue-600 font-bold text-sm">${day.holidayName}</div>
                    `;
                    container.appendChild(card);
                    return;
                }

                const createSection = (title, list) => {
                    if (!list || list.length === 0) return '';
                    let hasDanger = false;

                    const items = list.map(item => {
                        const itemAllergies = parseAllergies(item);
                        const isDangerous = itemAllergies.some(num => selectedAllergies.has(num));
                        if (isDangerous) hasDanger = true;

                        return `
                            <li class="py-1 px-2 rounded-lg text-xs transition-all duration-300 ${isDangerous ? 'danger-item-highlight' : 'text-slate-600'}">
                                ${isDangerous ? '⚠️ ' : ''}${item}
                            </li>
                        `;
                    }).join('');

                    return {
                        hasDanger,
                        html: `
                            <div class="flex-1 p-3 rounded-xl border ${hasDanger ? 'bg-red-50/10 border-red-100' : 'bg-slate-50/50 border-slate-100'}">
                                <span class="text-[10px] font-bold ${hasDanger ? 'text-red-500' : 'text-blue-600'} uppercase block mb-1.5">${title}</span>
                                <ul class="space-y-0.5">${items}</ul>
                            </div>
                        `
                    };
                };

                const lunchRes = createSection('☀️ 중식', day.lunch);
                const dinnerRes = createSection('🌙 석식', day.dinner);

                if (lunchRes.hasDanger || dinnerRes.hasDanger) {
                    card.classList.add('danger-card-highlight');
                }

                card.innerHTML = `
                    <div class="font-bold text-sm text-slate-800 border-b border-slate-100 pb-1.5 mb-2 flex justify-between items-center">
                        <span>${day.date}</span>
                        ${(lunchRes.hasDanger || dinnerRes.hasDanger) ? '<span class="text-[10px] text-red-600 font-bold bg-red-100 px-1.5 py-0.5 rounded-sm">알레르기 위험!</span>' : ''}
                    </div>
                    <div class="flex flex-col gap-2">
                        ${lunchRes.html}
                        ${dinnerRes.html}
                    </div>
                `;

                container.appendChild(card);
            });
        }



        function sendPushNotification(title, message) {
            if (Notification.permission === "granted") {
                new Notification(title, {
                    body: message,
                    icon: "https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=128"
                });
            }
        }

        // 체크박스 활성화 시 해당 주차 내 위험 식단을 감지하여 알려주는 똑똑한 로직
        function checkTodayAllergyAlert() {
            if (selectedAllergies.size === 0 || Notification.permission !== "granted") return;

            // 현재 사용자가 선택해 열어둔 주차의 데이터 중 위험 식단 분석
            const activeWeekData = mealData["6"][currentWeek] || [];
            let dangerousCount = 0;

            activeWeekData.forEach(day => {
                if (day.isHoliday) return;
                
                const checkMenuAllergy = (menuList) => {
                    if (!menuList) return;
                    menuList.forEach(item => {
                        const nums = parseAllergies(item);
                        if (nums.some(n => selectedAllergies.has(n))) {
                            dangerousCount++;
                        }
                    });
                };

                checkMenuAllergy(day.lunch);
                checkMenuAllergy(day.dinner);
            });

            if (dangerousCount > 0) {
                sendPushNotification(
                    "⚠️ 알레르기 유발 주의!", 
                    `이번 주 식단 내에 설정하신 알레르기 유발 물질이 포함된 음식이 ${dangerousCount}개 발견되었습니다.`
                );
            }
        }

        window.onload = init;
    </script>
</body>
